services:
  # Jaeger all-in-one for distributed tracing.
  #
  # Bring it up:   docker compose up -d jaeger
  # Run the DB:    STOREMY_OTEL=1 cargo run -- repl
  # Open the UI:   http://localhost:16686
  # Tear it down:  docker compose down jaeger
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: storemy-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686" # web UI
      - "4317:4317"   # OTLP gRPC (default for STOREMY_OTEL_ENDPOINT)
      - "4318:4318"   # OTLP HTTP (alternative)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  storemy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: storemy
    stdin_open: true # Keep STDIN open for interactive terminal
    tty: true # Allocate a pseudo-TTY for terminal UI
    volumes:
      - storemy-data:/app/data
    environment:
      - DATA_DIR=/app/data
      - TERM=xterm-256color # Enable colors in terminal
    networks:
      - storemy-network

  # Test Runner Service (for automated testing)
  storemy-test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: storemy-test
    volumes:
      - .:/app
      - storemy-test-data:/app/test_data
    working_dir: /app
    command:
      [
        "cargo",
        "test",
        "-p",
        "storemy",
        "--test",
        "integration",
        "--locked",
        "--release",
      ]
    networks:
      - storemy-network

  storemy-benchmark:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: storemy-benchmark
    volumes:
      - .:/app
      - ./benchmark-results:/app/benchmark-results
      - storemy-benchmark-data:/app/benchmark_data
      - storemy-benchmark-logs:/app/benchmark_logs
    working_dir: /app
    environment:
      - BENCHMARK_OUTPUT=/app/benchmark-results
      - BENCHMARK_ITERATIONS=1000
      - BENCHMARK_CONCURRENT_QUERIES=10
      - DB_NAME=benchmark_db
      - DATA_DIR=/app/benchmark_data
      - LOG_DIR=/app/benchmark_logs
    command:
      - /bin/sh
      - -c
      - |
        set -e
        echo "=========================================="
        echo "  StoreMy Criterion benchmarks (Rust)"
        echo "=========================================="
        echo ""
        mkdir -p /app/benchmark-results
        cargo bench -p storemy --locked 2>&1 | tee /app/benchmark-results/bench.log
        if [ -d /app/target/criterion ]; then
          rm -rf /app/benchmark-results/criterion 2>/dev/null || true
          cp -r /app/target/criterion /app/benchmark-results/criterion || true
        fi
        echo ""
        echo "=========================================="
        echo "  Done — see target/criterion (and ./benchmark-results/criterion on host)"
        echo "=========================================="
        echo ""
        echo "  • Log: ./benchmark-results/bench.log"
        echo "  • Criterion HTML: open ./benchmark-results/criterion/*/report/index.html"
        echo "  • Monitoring: docker compose --profile monitoring up -d"
        echo ""
    networks:
      - storemy-network
    profiles:
      - benchmark # Only starts when explicitly requested

  benchmark-viewer:
    image: busybox
    container_name: storemy-benchmark-viewer
    volumes:
      - ./benchmark-results:/results:ro
    command:
      - /bin/sh
      - -c
      - |
        echo "=========================================="
        echo "  StoreMy Benchmark Results"
        echo "=========================================="
        echo ""
        if [ ! -d "/results" ] || [ -z "$$(ls -A /results 2>/dev/null)" ]; then
          echo "❌ No benchmark results found!"
          echo ""
          echo "Run benchmarks first:"
          echo "  docker-compose --profile benchmark up storemy-benchmark"
          echo ""
          exit 1
        fi
        echo "📊 Available Reports:"
        echo ""
        ls -lt /results/*.html 2>/dev/null | head -5 | awk '{print "  • " $$9 " (" $$6 " " $$7 ")"}'
        echo ""
        echo "💡 To view:"
        echo "  • Criterion: benchmark-results/criterion/*/report/index.html"
        echo "  • Log:       benchmark-results/bench.log"
        echo ""
        echo "📈 Monitoring Dashboard:"
        echo "  • Grafana: http://localhost:3000 (admin/storemy)"
        echo "  • Start:   docker-compose --profile monitoring up -d"
        echo ""
    profiles:
      - benchmark

  prometheus:
    image: prom/prometheus:latest
    container_name: storemy-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    ports:
      - "9090:9090"
    networks:
      - storemy-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: storemy-grafana
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=storemy
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - storemy-network
    profiles:
      - monitoring

  storemy-metrics:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: storemy-metrics
    volumes:
      - .:/app
      - storemy-data:/app/data
      - storemy-metrics-logs:/app/metrics_logs
    environment:
      - DB_NAME=storemy_db
      - DATA_DIR=/app/data
      - LOG_DIR=/app/metrics_logs
      - METRICS_PORT=8080
    command:
      [
        "cargo",
        "run",
        "--release",
        "--locked",
        "-p",
        "storemy",
        "--bin",
        "metrics_exporter",
      ]
    ports:
      - "8080:8080"
    networks:
      - storemy-network
    profiles:
      - monitoring

volumes:
  storemy-data:
    driver: local
  storemy-test-data:
    driver: local
  storemy-benchmark-data:
    driver: local
  storemy-benchmark-logs:
    driver: local
  storemy-metrics-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  storemy-network:
    driver: bridge
