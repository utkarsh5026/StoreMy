services:
  # Jaeger all-in-one for distributed tracing.
  #
  # Bring it up:   docker compose up -d jaeger
  # Run the DB:    STOREMY_OTEL=1 cargo run -- repl
  # Open the UI:   http://localhost:16686
  # Tear it down:  docker compose down jaeger
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: storemy-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686" # web UI
      - "4317:4317"   # OTLP gRPC (default for STOREMY_OTEL_ENDPOINT)
      - "4318:4318"   # OTLP HTTP (alternative)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  storemy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: storemy
    stdin_open: true # Keep STDIN open for interactive terminal
    tty: true # Allocate a pseudo-TTY for terminal UI
    volumes:
      - storemy-data:/app/data
    environment:
      - DATA_DIR=/app/data
      - TERM=xterm-256color # Enable colors in terminal
    networks:
      - storemy-network

  # Test Runner Service (for automated testing)
  storemy-test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: storemy-test
    volumes:
      - .:/app
      - storemy-test-data:/app/test_data
    working_dir: /app
    command:
      [
        "cargo",
        "test",
        "-p",
        "storemy",
        "--test",
        "integration",
        "--locked",
        "--release",
      ]
    networks:
      - storemy-network

  prometheus:
    image: prom/prometheus:latest
    container_name: storemy-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    ports:
      - "9090:9090"
    networks:
      - storemy-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: storemy-grafana
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=storemy
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    networks:
      - storemy-network
    profiles:
      - monitoring
      - logging

  loki:
    image: grafana/loki:3.0.0
    container_name: storemy-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki:/etc/loki:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki.yml
    networks:
      - storemy-network
    profiles:
      - logging

  promtail:
    image: grafana/promtail:3.0.0
    container_name: storemy-promtail
    volumes:
      - ./data/logs:/var/log/storemy:ro
      - ./monitoring/promtail:/etc/promtail:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    networks:
      - storemy-network
    profiles:
      - logging

  storemy-metrics:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: storemy-metrics
    volumes:
      - .:/app
      - storemy-data:/app/data
      - storemy-metrics-logs:/app/metrics_logs
    environment:
      - DB_NAME=storemy_db
      - DATA_DIR=/app/data
      - LOG_DIR=/app/metrics_logs
      - METRICS_PORT=8080
    command:
      [
        "cargo",
        "run",
        "--release",
        "--locked",
        "-p",
        "storemy",
        "--bin",
        "metrics_exporter",
      ]
    ports:
      - "8080:8080"
    networks:
      - storemy-network
    profiles:
      - monitoring

volumes:
  storemy-data:
    driver: local
  storemy-test-data:
    driver: local
  storemy-metrics-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

networks:
  storemy-network:
    driver: bridge
