name: Update Changelog

# Runs automatically whenever a PR is merged into main
on:
  push:
    branches:
      - main

jobs:
  changelog:
    name: Regenerate CHANGELOG.md
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push the updated file back

    steps:
      - name: Checkout (full history — git-cliff needs all commits)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --output CHANGELOG.md

      - name: Commit updated CHANGELOG.md
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(changelog): regenerate after merge to main [skip ci]"
          file_pattern: CHANGELOG.md
          # [skip ci] prevents this commit from triggering the workflow again
