name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: we only need to read the repo contents.
permissions:
  contents: read

# Cancel in-flight runs on the same PR when a new push arrives.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NIGHTLY_FMT: nightly-2026-04-01
  RUST_TOOLCHAIN: 1.89.0

jobs:
  # ───────────────────────────────── Rust: fmt ──────────────────────────────
  # Fast, no compilation — runs on its own without cargo cache to stay cheap.
  rust-fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Rust nightly (rustfmt)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-01
          components: rustfmt
      - name: Format
        run: cargo +nightly-2026-04-01 fmt --all -- --check

  # ───────────────────── Rust: dep audits (deny, machete) ───────────────────
  # Runs against Cargo.lock only — doesn't need a full build.
  rust-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          shared-key: "storemy-deps"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install cargo-deny & cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-machete
      - name: cargo-deny
        run: cargo deny check
      - name: cargo-machete
        run: cargo machete

  # ───────────────────────────────── Rust: clippy ───────────────────────────
  rust-clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: rui314/setup-mold@v1
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - name: Install sccache
        uses: taiki-e/install-action@v2
        with:
          tool: sccache
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          shared-key: "storemy-build"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Clippy
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: ~/.cache/sccache
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ───────────────────────────────── Rust: docs ─────────────────────────────
  # Catches broken intra-doc links and doc comment errors before they land.
  rust-doc:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          shared-key: "storemy-build"
          save-if: false
      - name: Check docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps

  # ───────────────────────────────── Rust: test ─────────────────────────────
  rust-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: rui314/setup-mold@v1
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install sccache
        uses: taiki-e/install-action@v2
        with:
          tool: sccache
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          shared-key: "storemy-build"    # shares build artifacts with clippy
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Tests
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: ~/.cache/sccache
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo nextest run --workspace --profile ci
      - name: Doctests
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: ~/.cache/sccache
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo test --workspace --doc
      - name: Upload nextest JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit
          path: junit.xml
          if-no-files-found: ignore
      - name: Test summary
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: junit.xml
          detailed_summary: true

  # ─────────────────────────── Docker build (smoke) ─────────────────────────
  # Catches Dockerfile breakage early. Uses GHA layer cache so it's fast
  # on repeat runs.
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (smoke)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: storemy:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────── Required-checks gate ───────────────────────────
  # Set branch protection to require THIS job only. Adding or removing jobs
  # above won't require touching repo settings.
  ci-required:
    runs-on: ubuntu-latest
    needs: [rust-fmt, rust-deps, rust-clippy, rust-doc, rust-test, docker-build]
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          if echo "$results" | grep -q '"result": "failure"'; then
            echo "One or more required jobs failed."
            exit 1
          fi
          if echo "$results" | grep -q '"result": "cancelled"'; then
            echo "One or more required jobs were cancelled."
            exit 1
          fi
          echo "All required jobs passed."
