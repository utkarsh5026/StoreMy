name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: we only need to read the repo contents.
permissions:
  contents: read

# Cancel in-flight runs on the same PR when a new push arrives.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NIGHTLY_FMT: nightly-2026-04-01
  RUST_TOOLCHAIN: 1.88.0

jobs:
  # ───────────────────────────────── Rust: fmt ──────────────────────────────
  # Fast, no compilation — runs on its own without cargo cache to stay cheap.
  rust-fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Rust nightly (rustfmt)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-01
          components: rustfmt
      - name: Format
        run: cargo +nightly-2026-04-01 fmt --all -- --check

  # ───────────────────── Rust: dep audits (deny, machete) ───────────────────
  # Runs against Cargo.lock only — doesn't need a full build.
  rust-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          shared-key: "storemy-deps"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install cargo-deny & cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-machete
      - name: cargo-deny
        run: cargo deny check
      - name: cargo-machete
        run: cargo machete


  rust-clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: rui314/setup-mold@v1
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - name: Install sccache
        uses: taiki-e/install-action@v2
        with:
          tool: sccache
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          shared-key: "storemy-build"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Clippy
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: ~/.cache/sccache
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: rui314/setup-mold@v1
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install sccache
        uses: taiki-e/install-action@v2
        with:
          tool: sccache
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          shared-key: "storemy-build"    # shares build artifacts with clippy
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Tests
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: ~/.cache/sccache
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo nextest run --workspace --profile ci
      - name: Upload nextest JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit
          path: junit.xml
          if-no-files-found: ignore
      - name: Test summary
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: junit.xml
          detailed_summary: true

  # Separate lightweight job — pure IO, no compilation.
  rust-typos:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Typos
        uses: crate-ci/typos@master

