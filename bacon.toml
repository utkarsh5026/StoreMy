# bacon — background rust code checker (better than `cargo watch`).
# Install: `cargo install --locked bacon`
# Run: `bacon` (picks default job) or `bacon <job>` (e.g., `bacon test-lib-db`).
# Docs: https://dystroy.org/bacon/

default_job = "check-db"

# Where bacon watches. Excludes target/, node_modules.
[additional_job_options]
# No-op here; jobs below set their own.

[jobs.check]
command = ["cargo", "check", "--workspace", "--all-targets", "--color", "always"]
need_stdout = false

[jobs.check-db]
command = ["cargo", "check", "-p", "storemy", "--all-targets", "--color", "always"]
need_stdout = false

[jobs.clippy]
command = [
  "cargo", "clippy", "--workspace", "--all-targets", "--color", "always",
  "--", "-D", "warnings",
]
need_stdout = false

[jobs.clippy-pedantic]
command = [
  "cargo", "clippy", "--workspace", "--all-targets", "--color", "always",
  "--", "-W", "clippy::pedantic",
  "-A", "clippy::missing_errors_doc",
  "-A", "clippy::missing_panics_doc",
  "-A", "clippy::must_use_candidate",
]
need_stdout = false

[jobs.test]
command = [
  "cargo", "nextest", "run", "--workspace", "--color", "always",
  "--hide-progress-bar", "--status-level=fail",
]
need_stdout = true

# Test just one crate — run with `bacon test-db`.
[jobs.test-db]
command = [
  "cargo", "nextest", "run", "-p", "storemy", "--color", "always",
  "--hide-progress-bar", "--status-level=fail",
]
need_stdout = true

# Test only the storemy library unit tests — run with `bacon test-lib-db`.
[jobs.test-lib-db]
command = [
  "cargo", "nextest", "run", "-p", "storemy", "--lib", "--color", "always",
  "--hide-progress-bar", "--status-level=fail",
]
need_stdout = true

[jobs.doc]
command = ["cargo", "doc", "--workspace", "--no-deps", "--color", "always"]
need_stdout = false

[jobs.doc-open]
command = ["cargo", "doc", "--workspace", "--no-deps", "--open", "--color", "always"]
need_stdout = false
on_success = "back" # return to previous job after opening

# Key bindings inside bacon's TUI.
[keybindings]
t = "job:test"
c = "job:clippy"
k = "job:check-db"
l = "job:test-lib-db"
d = "job:doc"
f = "job:clippy-pedantic"
